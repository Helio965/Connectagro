{% extends "base.html" %}

{% block title %}Entrar — ConnectAgro{% endblock %}

{% block content %}
<section class="card login-card">
  <h1>Entrar no ConnectAgro</h1>
  <p>Acesse com seu e-mail e senha.</p>

  <form method="post" action="{{ url_for('auth.login') }}" class="login-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" required autofocus
           autocomplete="username" placeholder="voce@exemplo.com">

    <label for="senha">Senha</label>
    <div class="password-field">
      <input type="password" id="senha" name="senha" required
             autocomplete="current-password" placeholder="Sua senha">
      <button type="button" class="password-toggle" aria-label="Mostrar senha"
              aria-pressed="false" aria-controls="senha"
              data-password-toggle data-target="senha">
        <svg class="password-toggle-icon icon-eye" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <svg class="password-toggle-icon icon-eye-off" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        </svg>
      </button>
    </div>

    <button type="submit" class="btn-entrar">Entrar</button>
  </form>

  <p class="login-links">
    <a href="{{ url_for('auth.esqueci_senha') }}">Esqueci minha senha</a>
  </p>
</section>
{% endblock %}
