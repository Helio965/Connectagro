{% extends "base.html" %}

{% block title %}Entrar — ConnectAgro{% endblock %}

{% block content %}
<section class="card login-card">
  <h1>Entrar no ConnectAgro</h1>
  <p>Acesse com seu e-mail e senha.</p>

  <form method="post" action="{{ url_for('auth.login') }}" class="login-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" required autofocus
           autocomplete="username" placeholder="voce@exemplo.com">

    <label for="senha">Senha</label>
    <input type="password" id="senha" name="senha" required
           autocomplete="current-password" placeholder="Sua senha">

    <button type="submit" class="btn-entrar">Entrar</button>
  </form>
</section>
{% endblock %}
