{% extends "base.html" %}

{% block title %}{{ "Editar" if gleba else "Nova" }} gleba — ConnectAgro{% endblock %}

{% block content %}
<section class="card">
  <h1>{{ "Editar gleba" if gleba else "Nova gleba" }}</h1>

  <form method="post" class="form-vertical"
        action="{{ url_for('glebas.editar', gleba_id=gleba.id) if gleba else url_for('glebas.nova') }}">
    <label for="nome">Nome *</label>
    <input type="text" id="nome" name="nome" required value="{{ form.nome or '' }}">

    <label for="area_ha">Área (ha)</label>
    <input type="text" id="area_ha" name="area_ha" value="{{ form.area_ha if form.area_ha is not none else '' }}">

    <label for="latitude">Latitude</label>
    <input type="text" id="latitude" name="latitude" value="{{ form.latitude if form.latitude is not none else '' }}">

    <label for="longitude">Longitude</label>
    <input type="text" id="longitude" name="longitude" value="{{ form.longitude if form.longitude is not none else '' }}">

    <label for="tipo_solo">Tipo de solo</label>
    <input type="text" id="tipo_solo" name="tipo_solo" value="{{ form.tipo_solo or '' }}">

    <label for="observacoes">Observações</label>
    <textarea id="observacoes" name="observacoes" rows="3">{{ form.observacoes or '' }}</textarea>

    <div class="form-acoes">
      <button type="submit" class="btn-acao">Salvar</button>
      <a href="{{ url_for('glebas.index') }}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
