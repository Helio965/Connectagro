<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titulo %}ConnectAgro{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f4; font-family:Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f4; padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0"
               style="max-width:560px; width:100%; background-color:#ffffff; border-radius:12px; overflow:hidden; border:1px solid #dfe7df;">
          <tr>
            <td style="background-color:#0b3d1b; padding:20px 28px;">
              <span style="color:#ffffff; font-size:20px; font-weight:bold;">ConnectAgro</span>
              <span style="color:#4ade80; font-size:12px; display:block; margin-top:2px;">Gestão agrícola</span>
            </td>
          </tr>
          <tr>
            <td style="padding:28px; color:#1c2b20; font-size:15px; line-height:1.6;">
              {% block conteudo %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px 24px; color:#6b7c6e; font-size:12px; line-height:1.5; border-top:1px solid #eef2ee;">
              O ConnectAgro <strong>nunca envia senhas por e-mail</strong> e nunca pede
              sua senha por mensagem. Se você não esperava este e-mail, pode
              ignorá-lo com segurança.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
